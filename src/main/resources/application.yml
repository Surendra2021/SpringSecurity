spring:
    datasource:
        url: jdbc:postgresql://localhost:5432/postgres
        username: postgres
        password: welcome
        driver-class-name: org.postgresql.Driver
    jpa:
      hibernate:
            ddl-auto: create-drop
      show-sql: true
      properties:
          hibernate:
           format_sql: true
      database-platform: org.hibernate.dialect.PostgreSQLDialect
      database: PostgreSQL
    data:
      redis:
        host: localhost
        port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,beans,env
  endpoint:
    health:
      show-details: always

app:
  password-min-length: 6

jwt:
  secret: "MySuperSecretKeyForJWTThatIsAtLeast256BitsLong!!"
  expiration: 86400000

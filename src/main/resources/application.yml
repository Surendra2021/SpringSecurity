spring:
    datasource:
        url: jdbc:postgresql://localhost:5432/postgres
        username: postgres
        password: welcome
        driver-class-name: org.postgresql.Driver
    jpa:
      hibernate:
            ddl-auto: create-drop
      show-sql: true
      properties:
          hibernate:
           format_sql: true
      database-platform: org.hibernate.dialect.PostgreSQLDialect
      database: PostgreSQL

# ─────────────────────────────────────────────────
# JWT Configuration
# ─────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,beans,env  # which endpoints to expose
  endpoint:
    health:
      show-details: always  # show DB connection status in health check

app:
  password-min-length: 6

jwt:
  # Secret key used to SIGN tokens (HS256).
  # Must be at least 256 bits (32 chars) for HMAC-SHA256.
  # In production: store this in env vars / vault, never hardcode.
  secret: "MySuperSecretKeyForJWTThatIsAtLeast256BitsLong!!"

  # Token validity duration in milliseconds.
  # 86400000 ms = 24 hours
  expiration: 86400000
